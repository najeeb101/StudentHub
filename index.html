<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>StudentHub - Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: #ffffff;
    }

    .brand-icon {
      width: 220px;
      height: 220px;
      margin-bottom: 24px;
      object-fit: contain;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.3));
    }

    .loading-text {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.5px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.6;
      }
    }
  </style>
</head>

<body>

  <img class="brand-icon" src="media/StudentHub-logo.png" alt="StudentHub Logo" />
  <div class="loading-text">Loading StudentHub...</div>

  <script>
    // Entry Point Router Logic
    (function () {
      const CURRENT_USER_KEY = "sh_currentUser";

      // Small timeout to allow the cool loading screen to flash for a split second 
      setTimeout(() => {
        try {
          const localRaw = localStorage.getItem(CURRENT_USER_KEY);
          const sessionRaw = sessionStorage.getItem(CURRENT_USER_KEY);

          // If the user has an active session saved, immediately take them to the feed
          if (localRaw || sessionRaw) {
            window.location.replace("pages/feed.html");
          } else {
            // Otherwise, route them directly to the login page
            window.location.replace("pages/login.html");
          }
        } catch (e) {
          // Fallback in case localStorage is disabled by the browser
          window.location.replace("pages/login.html");
        }
      }, 600);
    })();
  </script>
</body>

</html>
