<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>StudentHub – Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/login.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-shell">
        <!-- Left side: branding and copy -->
        <div class="auth-hero">
          <div class="brand-mark">
            <div class="brand-icon" style="width: 48px; height: 48px; border-radius: 12px; font-size: 24px;">S</div>
            <div>
              <div class="brand-text-main">StudentHub</div>
              <div class="brand-text-sub">Campus social space for students</div>
            </div>
          </div>
          <h1 class="hero-title">
            Join your <span class="hero-highlight">campus community</span> in
            one place.
          </h1>
          <p class="hero-body">
            Where ideas meet people
          </p>

          <div class="hero-badges">
            <span class="badge">Connect. Learn. Belong</span>
          </div>
        </div>

        <!-- Right side: authentication card -->
        <section class="auth-card" aria-label="Authentication">
          
          <div class="auth-header">
            <h2 class="auth-title">Log in</h2>
            <p class="auth-subtitle">Join the student hub.</p>
          </div>

          <!-- Global feedback message area -->
          <div id="authAlert" class="alert" role="status" aria-live="polite"></div>

          <form id="loginForm" novalidate>
            <div class="form-grid">
              <div class="field">
                <input
                  id="loginEmail"
                  class="field-input"
                  style="padding: 14px; font-size: 16px;"
                  type="email"
                  name="email"
                  autocomplete="email"
                  placeholder="Email address"
                  required
                />
                <div id="loginEmailError" class="field-error"></div>
              </div>

              <div class="field">
                <input
                  id="loginPassword"
                  class="field-input-password"
                  style="padding: 14px; font-size: 16px;"
                  type="password"
                  name="password"
                  autocomplete="current-password"
                  placeholder="Password"
                  required
                />
                <div id="loginPasswordError" class="field-error"></div>
              </div>
            </div>

            <div class="auth-actions" style="margin-top: 16px;">
              <button type="submit" class="btn-primary" style="padding: 12px; font-size: 20px; width: 100%; border-radius: 6px;">
                Log In
              </button>
            </div>
            
            <div style="text-align: center; margin-top: 16px;">
              <a href="#" class="muted-link" style="font-size: 14px;">Forgotten password?</a>
            </div>

            <div class="auth-divider"></div>
            
            <div class="auth-actions" style="margin-top: 0; display: flex; justify-content: center;">
              <a href="signup.html" class="btn-create-account">
                Create new account
              </a>
            </div>
          </form>
        </section>
      </section>
    </main>
    <script src="../js/login.js"></script>
  </body>
</html>
