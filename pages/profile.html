<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>StudentHub - Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/feed.css" />
    <link rel="stylesheet" href="../css/profile.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="nav-container">
        <div class="brand-mark">
          <img
            src="../media/StudentHub-logo.png"
            alt="StudentHub Logo"
            style="width: 100px; height: 100px; object-fit: contain"
          />
          <span class="brand-text">StudentHub</span>
        </div>
        <div class="nav-actions">
          <div class="user-profile">
            <span class="username"></span>
            <img id="navAvatar" src="" alt="avatar" class="avatar" />
          </div>
          <a
            id="feedLink"
            href="feed.html"
            class="btn-secondary-small"
            style="margin-left: 16px; text-decoration: none"
            >Feed</a
          >
          <button
            id="logoutBtn"
            class="btn-secondary-small"
            style="margin-left: 8px"
          >
            Logout
          </button>
        </div>
      </div>
    </header>

    <main class="profile-page">
      <!-- Profile -->
      <section class="profile-card">
        <div class="profile-top">
          <img
            id="profileAvatar"
            src=""
            alt="Avatar"
            class="profile-avatar-img"
          />
          <div class="profile-details">
            <h2 id="profileName" class="profile-name"></h2>
            <span id="profileUsername " class="profile-username"></span>
            <p id="profileBio" class="profile-bio"></p>
            <div class="profile-stats">
              <span><strong id="statposts">0</strong> Posts</span>
              <span class="stat-btn" id="followingBtn"
                ><strong id="statFollowing">0</strong> Following</span
              >
              <span class="stat-btn" id="followersBtn"
                ><strong id="statFollowers">0</strong> Followers</span
              >
            </div>
          </div>
          <div id="profileActions" class="profile-actions"></div>
        </div>

        <!-- Own Profile Edit (Default Hidden)-->

        <script src="../js/profile.js"></script>
        <div id="editForm" class="edit-form" style="display: none">
          <h3>Edit Profile</h3>
          <div id="editAlert" class="edit-alert"></div>
          <div class="edit-field">
            <label for="editUsername">Username</label>
            <input type="text" id="editUsername" class="edit-input" />
            />
          </div>
          <div class="edit-field">
            <label for="editBio">Bio</label>
            <textarea
              id="editBio"
              class="edit-input"
              rows="3"
              style="resize: vertical; font-family: inherit"
            ></textarea>
          </div>
          <div class="edit-field">
            <label for="editPhoto">Profile Photo</label>
            <input
              type="text"
              id="editPhoto"
              accept="image/*"
              class="edit-input"
              style="padding: 7px"
            />
          </div>
          <div class="edit-actions">
            <button class="btn-primary" id="saveProfileBtn">
              Save Changes
            </button>
            <button
              class="btn-secondary-small"
              id="cancelEditBtn"
              style="background: gray"
            >
              Cancel
            </button>
          </div>
        </div>
      </section>

      <!-- Own Posts -->
      <section class="profile-posts-section">
        <h3 class="posts-heading">Posts</h3>
        <div id="userPostStream" class="post-stream"></div>
      </section>

      <!-- Followers Modal -->
      <div id="usersModal" class="modal-overlay" style="display: none">
        <div class="modal-box">
          <div class="modal-header">
            <h3 class="modalTitle">Users</h3>
            <button id="modalCloseBtn" class="modal-close">X</button>
          </div>
          <ul id="modalUserList" class="modal-user-list"></ul>
        </div>
      </div>
    </main>
  </body>
</html>
