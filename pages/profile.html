<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>StudentHub – Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/feed.css" />
    <link rel="stylesheet" href="../css/profile.css" />
  </head>
  <body>
    <!-- Navbar -->
    <header class="navbar">
      <div class="nav-container">
        <div class="brand-mark">
          <img
            src="../media/StudentHub-logo.png"
            alt="StudentHub Logo"
            class="brand-logo"
          />
          <span class="brand-text">StudentHub</span>
        </div>
        <div class="nav-actions">
          <div class="user-profile">
            <span class="username"></span>
            <img id="navAvatar" src="" alt="Avatar" class="avatar" />
          </div>
          <a
            id="feedLink"
            href="feed.html"
            class="btn-secondary-small nav-cta nav-link-btn"
            >Feed</a
          >
          <button id="logoutBtn" class="btn-secondary-small nav-cta-tight">
            Logout
          </button>
        </div>
      </div>
    </header>

    <main class="profile-page">
      <!-- Profile Card -->
      <section class="profile-card">
        <div class="profile-top">
          <img
            id="profileAvatar"
            src=""
            alt="Avatar"
            class="profile-avatar-img"
          />
          <div class="profile-details">
            <h2 id="profileName" class="profile-name"></h2>
            <span id="profileUsername" class="profile-username"></span>
            <p id="profileBio" class="profile-bio"></p>
            <div class="profile-stats">
              <span><strong id="statPosts">0</strong> Posts</span>
              <span class="stat-btn" id="followingBtn"
                ><strong id="statFollowing">0</strong> Following</span
              >
              <span class="stat-btn" id="followersBtn"
                ><strong id="statFollowers">0</strong> Followers</span
              >
            </div>
          </div>
          <div id="profileActions" class="profile-actions"></div>
        </div>

        <!-- Edit Profile Form (own profile only, hidden by default) -->
        <div id="editForm" class="edit-form" style="display: none">
          <h3>Edit Profile</h3>
          <div id="editAlert" class="edit-alert"></div>
          <div class="edit-field">
            <label for="editUsername">Username</label>
            <input
              type="text"
              id="editUsername"
              class="edit-input"
              maxlength="30"
            />
          </div>
          <div class="edit-field">
            <label for="editBio">Bio</label>
            <textarea
              id="editBio"
              class="edit-input"
              rows="3"
              maxlength="160"
              style="resize: vertical; font-family: inherit"
            ></textarea>
          </div>
          <div class="edit-field">
            <label for="editPhoto">Profile Photo</label>
            <div class="edit-photo-row">
              <input
                type="file"
                id="editPhoto"
                accept="image/*"
                class="edit-input"
                style="padding: 7px; background: #fff"
              />
              <button
                type="button"
                id="removePhotoBtn"
                class="btn-secondary-small"
                style="background: #6b7280"
              >
                Remove Photo
              </button>
            </div>
          </div>
          <div class="edit-actions">
            <button class="btn-primary" id="saveProfileBtn">
              Save Changes
            </button>
            <button
              class="btn-secondary-small"
              id="cancelEditBtn"
              style="background: #6b7280"
            >
              Cancel
            </button>
          </div>
        </div>
      </section>

      <!-- User's Posts -->
      <section class="profile-posts-section">
        <h3 class="posts-heading">Posts</h3>
        <div id="userPostStream" class="post-stream"></div>
      </section>
    </main>

    <!-- Followers / Following Modal -->
    <div id="usersModal" class="modal-overlay" style="display: none">
      <div class="modal-box">
        <div class="modal-header">
          <h3 id="modalTitle">Users</h3>
          <button id="modalCloseBtn" class="modal-close">✕</button>
        </div>
        <ul id="modalUserList" class="modal-user-list"></ul>
      </div>
    </div>

    <script src="../js/profile.js"></script>
  </body>
</html>
